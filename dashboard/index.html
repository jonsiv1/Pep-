<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#11110f" />
<title>Sales dashboard</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #11110f;
    --panel: #191916;
    --panel-soft: #20201c;
    --panel-hover: #262620;
    --track: #0d0d0b;
    --line: rgba(255, 255, 255, .09);
    --line-strong: rgba(255, 255, 255, .16);
    --line-soft: rgba(255, 255, 255, .055);
    --text: #f7f4ed;
    --text-soft: #dbd8d0;
    --muted: #aaa79e;
    --faint: #76736c;
    --accent: #900000;
    --accent-hover: #ad1f1f;
    --accent-strong: #e07a7a;
    --accent-ink: #fff8f8;
    --up: #65d196;
    --down: #ff7d73;
    --shadow: 0 20px 60px rgba(0, 0, 0, .28);
    --radius: 22px;
    --radius-sm: 14px;
  }

  * { box-sizing: border-box; }
  html { min-width: 320px; background: var(--bg); }
  body {
    min-height: 100vh;
    margin: 0;
    color: var(--text);
    background:
      radial-gradient(circle at 80% -20%, rgba(144, 0, 0, .22), transparent 34rem),
      var(--bg);
    font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  button { color: inherit; font: inherit; }
  button:focus-visible {
    outline: 3px solid rgba(224, 122, 122, .55);
    outline-offset: 2px;
  }
  ::selection { background: rgba(144, 0, 0, .42); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--panel-hover); border-radius: 6px; }

  .app-shell {
    width: min(1500px, 100%);
    margin: 0 auto;
    padding: 24px clamp(16px, 3vw, 44px) 64px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    min-height: 60px;
    margin-bottom: 28px;
  }
  .brand { display: flex; align-items: center; gap: 13px; }
  .brand-mark {
    display: grid;
    width: 42px;
    height: 42px;
    place-items: center;
    border: 1px solid rgba(224, 122, 122, .35);
    border-radius: 13px;
    color: var(--accent-strong);
    background: rgba(144, 0, 0, .16);
    box-shadow: inset 0 1px rgba(255, 255, 255, .08);
  }
  .brand-mark svg { display: block; width: 23px; height: 23px; }
  .brand-copy { display: grid; gap: 1px; }
  .brand-name { font-size: 18px; font-weight: 750; letter-spacing: -.02em; }
  .brand-subtitle {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .report-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 36px;
    padding: 0 13px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--muted);
    background: rgba(25, 25, 22, .8);
    font-size: 13px;
    font-weight: 650;
    white-space: nowrap;
  }
  .report-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--up);
    box-shadow: 0 0 0 4px rgba(101, 209, 150, .1);
  }

  .page-head {
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 28px;
    overflow: hidden;
    min-height: 190px;
    margin-bottom: 18px;
    padding: clamp(24px, 4vw, 38px);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: linear-gradient(145deg, rgba(32, 32, 28, .96), rgba(24, 24, 21, .96));
    box-shadow: var(--shadow);
  }
  .page-head::after {
    position: absolute;
    right: -90px;
    bottom: -180px;
    width: 310px;
    height: 310px;
    border: 54px solid rgba(144, 0, 0, .11);
    border-radius: 50%;
    content: "";
    pointer-events: none;
  }
  .page-copy, .toggles { position: relative; z-index: 1; }
  .eyebrow {
    margin: 0 0 11px;
    color: var(--accent-strong);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: .13em;
    text-transform: uppercase;
  }
  h1 {
    margin: 0;
    font-size: clamp(36px, 5vw, 58px);
    font-weight: 780;
    letter-spacing: -.055em;
    line-height: .98;
  }
  .sub { margin: 14px 0 0; color: var(--muted); font-size: 14px; line-height: 1.55; }
  .toggles { display: flex; flex-wrap: wrap; align-items: center; justify-content: flex-end; gap: 10px; }
  .seg {
    display: flex;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--line);
    border-radius: 13px;
    background: rgba(25, 25, 22, .9);
  }
  .seg button {
    min-height: 34px;
    padding: 0 13px;
    border: 0;
    border-radius: 9px;
    color: var(--muted);
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    font-weight: 720;
    transition: color .16s ease, background .16s ease;
  }
  .seg button:hover { color: var(--text); background: var(--panel-soft); }
  .seg button.on { color: var(--accent-ink); background: var(--accent); }

  .dashboard-body { display: flex; flex-direction: column; gap: 14px; }
  .dates {
    position: relative;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 7px;
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    background: var(--panel);
  }
  .pill {
    min-height: 36px;
    padding: 0 14px;
    border: 1px solid transparent;
    border-radius: 10px;
    color: var(--muted);
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    font-weight: 720;
    transition: color .16s ease, border-color .16s ease, background .16s ease;
  }
  .pill:hover { color: var(--text); background: var(--panel-hover); }
  .pill.on {
    border-color: rgba(224, 122, 122, .32);
    color: var(--accent-strong);
    background: rgba(144, 0, 0, .17);
  }
  .rangetext {
    margin-left: auto;
    padding: 0 10px;
    color: var(--muted);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    font-weight: 650;
  }

  .tiles { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
  .hero {
    position: relative;
    display: flex;
    grid-column: 1 / -1;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    overflow: hidden;
    min-height: 190px;
    padding: clamp(25px, 4vw, 38px);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: linear-gradient(145deg, rgba(32, 32, 28, .96), rgba(24, 24, 21, .96));
    box-shadow: var(--shadow);
  }
  .hero::after {
    position: absolute;
    right: -74px;
    bottom: -150px;
    width: 260px;
    height: 260px;
    border: 44px solid rgba(144, 0, 0, .085);
    border-radius: 50%;
    content: "";
    pointer-events: none;
  }
  .hero > * { position: relative; z-index: 1; }
  .hero .label, .tile .label, .card-title {
    color: var(--muted);
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: .085em;
    text-transform: uppercase;
  }
  .hero .label { color: var(--accent-strong); }
  .hero .big {
    margin-top: 8px;
    color: var(--text);
    font-size: clamp(38px, 6vw, 64px);
    font-weight: 780;
    letter-spacing: -.055em;
    line-height: .98;
    font-variant-numeric: tabular-nums;
  }
  .delta { font-size: 21px; font-weight: 760; text-align: right; font-variant-numeric: tabular-nums; }
  .delta .sub { margin: 4px 0 0; color: var(--faint); font-size: 12px; font-weight: 600; }

  .tile, .card {
    border: 1px solid var(--line);
    background: linear-gradient(155deg, rgba(31, 31, 27, .98), rgba(24, 24, 21, .98));
    box-shadow: 0 10px 28px rgba(0, 0, 0, .14);
  }
  .tile {
    display: flex;
    min-height: 132px;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    padding: 20px 22px;
    border-radius: 18px;
  }
  .tile .value { font-size: 29px; font-weight: 760; letter-spacing: -.035em; font-variant-numeric: tabular-nums; }
  .tile .value.cream { color: var(--accent-strong); }
  .tile .date { color: var(--faint); font-size: 12px; font-variant-numeric: tabular-nums; }

  .card { padding: 23px 24px; border-radius: 18px; }
  .card-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 16px; }
  .card-note { color: var(--faint); font-size: 12px; }
  #chartMount > svg { display: block; width: 100%; height: auto; overflow: visible; }

  .catrow {
    display: grid;
    grid-template-columns: minmax(110px, 180px) 1fr auto;
    align-items: center;
    gap: 13px;
    margin-bottom: 13px;
  }
  .catrow:last-child { margin-bottom: 0; }
  .catname { overflow: hidden; color: var(--text-soft); font-size: 13px; text-overflow: ellipsis; white-space: nowrap; }
  .cattrack { overflow: hidden; height: 19px; border-radius: 6px; background: var(--track); }
  .catbar { height: 100%; border-radius: 6px; }
  .catval { display: flex; align-items: baseline; gap: 10px; }
  .catval b { min-width: 94px; font-size: 13px; font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }
  .catval span { min-width: 52px; color: var(--faint); font-size: 11.5px; text-align: right; font-variant-numeric: tabular-nums; }

  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; font-variant-numeric: tabular-nums; }
  th {
    padding: 10px;
    border-bottom: 1px solid var(--line);
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .06em;
    text-align: right;
    text-transform: uppercase;
  }
  td { padding: 11px 10px; border-bottom: 1px solid var(--line-soft); text-align: right; }
  tbody tr { transition: background .15s ease; }
  tbody tr:hover { background: rgba(255, 255, 255, .025); }
  th:first-child, td:first-child { text-align: left; }
  td.date { color: var(--text-soft); }
  td.vat { color: var(--muted); }
  td.incl { color: var(--accent-strong); font-weight: 700; }

  .cal {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    z-index: 20;
    width: 300px;
    padding: 16px;
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm);
    background: var(--panel-soft);
    box-shadow: 0 30px 100px rgba(0, 0, 0, .55);
  }
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-head b { font-size: 13.5px; font-weight: 740; }
  .cal-nav, .cal-done button {
    border: 1px solid var(--line);
    border-radius: 9px;
    color: var(--text-soft);
    background: var(--panel-hover);
    cursor: pointer;
    font-weight: 700;
  }
  .cal-nav { width: 32px; height: 32px; font-size: 14px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px 0; justify-items: center; }
  .cal-dow { padding: 4px 0; color: var(--faint); font-size: 10.5px; font-weight: 650; text-align: center; }
  .cal-day {
    width: 35px;
    height: 33px;
    border: 0;
    border-radius: 8px;
    color: var(--text-soft);
    background: transparent;
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .cal-day:hover:not(.disabled) { background: var(--panel-hover); }
  .cal-day.edge { color: var(--accent-ink); background: var(--accent); font-weight: 760; }
  .cal-day.between { border-radius: 0; background: rgba(144, 0, 0, .17); }
  .cal-day.disabled { color: #4f4d47; cursor: default; }
  .cal-hint { margin-top: 10px; color: var(--muted); font-size: 11.5px; line-height: 1.45; text-align: center; }
  .cal-done { display: flex; justify-content: flex-end; margin-top: 9px; }
  .cal-done button { padding: 7px 14px; font-size: 12px; }

  .state { padding: 52px 20px; color: var(--muted); font-size: 14px; text-align: center; }
  .tooltip {
    position: absolute;
    top: 0;
    z-index: 5;
    display: none;
    padding: 11px 13px;
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    color: var(--text);
    background: rgba(31, 31, 27, .98);
    box-shadow: var(--shadow);
    font-size: 12.5px;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
    white-space: nowrap;
  }
  .tooltip .t-date { margin-bottom: 5px; font-weight: 740; }
  .tooltip .t-row { display: flex; justify-content: space-between; gap: 18px; }

  @media (max-width: 900px) {
    .page-head { align-items: flex-start; flex-direction: column; }
    .toggles { justify-content: flex-start; }
    .tiles { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  @media (max-width: 620px) {
    .app-shell { padding: 14px 16px 48px; }
    .topbar { margin-bottom: 18px; }
    .report-pill span:last-child { display: none; }
    .report-pill { width: 36px; padding: 0; justify-content: center; }
    .page-head { min-height: auto; padding: 25px 21px; border-radius: 18px; }
    h1 { font-size: 38px; }
    .toggles, .seg { width: 100%; }
    .seg button { flex: 1; padding: 0 8px; }
    .dates { border-radius: 13px; }
    .rangetext { width: 100%; margin: 3px 0 2px; }
    .tiles { grid-template-columns: 1fr; }
    .hero { min-height: 180px; padding: 25px 21px; border-radius: 18px; }
    .hero .big { font-size: 40px; }
    .tile { min-height: 112px; }
    .card { padding: 20px 18px; }
    .card-head { align-items: flex-start; flex-direction: column; }
    .catrow { grid-template-columns: minmax(0, 1fr) auto; gap: 8px 12px; }
    .cattrack { grid-column: 1 / -1; grid-row: 2; }
    .catval b { min-width: 0; }
    .catval span { min-width: 44px; }
    table { min-width: 650px; }
    .cal { width: min(300px, calc(100vw - 32px)); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition-duration: .01ms !important; }
  }
</style>
</head>
<body>
<main class="app-shell">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 16.5 12 3l8 13.5c-5.1 2.1-10.9 2.1-16 0Z"/>
          <path d="M7.6 11.3h.01M13.8 8.8h.01M14.8 14h.01" stroke-linecap="round" stroke-width="2.8"/>
        </svg>
      </div>
      <div class="brand-copy">
        <span class="brand-name">Askur</span>
        <span class="brand-subtitle">Sales dashboard</span>
      </div>
    </div>
    <div class="report-pill"><span class="report-dot"></span><span>Daily reporting</span></div>
  </header>

  <section class="page-head" aria-labelledby="page-title">
    <div class="page-copy">
      <p class="eyebrow">Business overview</p>
      <h1 id="page-title">Sales dashboard.</h1>
      <p class="sub">WooCommerce and DineOut performance, updated automatically each morning.</p>
    </div>
    <div class="toggles">
      <div class="seg" id="channelSeg"></div>
      <div class="seg" id="vatSeg"></div>
    </div>
  </section>

  <div id="body" class="dashboard-body"></div>
</main>

<script>
(function(){
  // ---------- formatting (Icelandic) ----------
  var fmt0 = function(n){ return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.'); };
  var fmtKr = function(n){ return fmt0(n)+' kr'; };
  var fmtCompact = function(n){
    if(n>=1e6) return (n/1e6).toFixed(1).replace('.',',').replace(',0','')+'M';
    if(n>=1e3) return Math.round(n/1e3)+'K';
    return fmt0(n);
  };
  var fmtIS = function(iso){ var p=iso.split('-'); return p[2]+'.'+p[1]+'.'+p[0]; };
  var fmtShort = function(iso){ var p=iso.split('-'); return p[2]+'.'+p[1]+'.'; };
  var addDays = function(iso,n){ var d=new Date(iso+'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().slice(0,10); };
  var svgNS='http://www.w3.org/2000/svg';
  function el(t,a){ var e=document.createElementNS(svgNS,t); for(var k in a) e.setAttribute(k,a[k]); return e; }

  var S = { days:null, selStart:null, selEnd:null, preset:'30d', vat:'incl', channel:'combined',
            calOpen:false, calMonth:null, picking:false };
  var body = document.getElementById('body');

  // ---------- load ----------
  fetch('data/history.json').then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .catch(function(){ return fetch('../data/history.json').then(function(r){ return r.json(); }); })
    .then(function(data){
      var days = (data.daily||[]).slice().sort(function(a,b){ return a.date<b.date?-1:1; });
      if(!days.length){ body.innerHTML='<div class="card"><div class="state">No data yet. The first daily report will populate this dashboard.</div></div>'; return; }
      S.days=days; applyPreset('30d'); renderToggles(); render();
    })
    .catch(function(err){ body.innerHTML='<div class="card"><div class="state">Could not load data/history.json ('+err+')</div></div>'; });

  // ---------- date helpers ----------
  function maxDate(){ return S.days[S.days.length-1].date; }
  function minDate(){ return S.days[0].date; }
  function applyPreset(p){
    var end=maxDate(), start=end;
    if(p==='latest'){ start=end=maxDate(); }
    else if(p==='7d') start=addDays(end,-6);
    else if(p==='30d') start=addDays(end,-29);
    else if(p==='90d') start=addDays(end,-89);
    else if(p==='all') start=minDate();
    if(start<minDate()) start=minDate();
    S.preset=p; S.selStart=start; S.selEnd=end; S.calOpen=false; S.picking=false;
  }

  // ---------- data helpers ----------
  function chOf(d){ return (S.channel==='combined'?d.combined:d[S.channel])||{categories:{}}; }
  function vatKey(){ return S.vat==='incl'?'total_incl_vat':'total_excl_vat'; }
  function catKey(){ return S.vat==='incl'?'incl_vat':'excl_vat'; }
  function totalOf(d){ var ch=chOf(d); if(ch[vatKey()]!=null) return ch[vatKey()];
    var k=catKey(); return Object.keys(ch.categories||{}).reduce(function(s,n){ return s+(ch.categories[n][k]||0); },0); }
  function ordersOf(d){ var ch=chOf(d); return ch.order_count!=null?ch.order_count:(d.combined.order_count||0); }
  function inRange(){ return S.days.filter(function(d){ return d.date>=S.selStart && d.date<=S.selEnd; }); }

  // ---------- toggles ----------
  function renderToggles(){
    var chan=[['combined','Combined'],['dineout','DineOut'],['woocommerce','Woo']];
    document.getElementById('channelSeg').innerHTML=chan.map(function(c){
      return '<button class="'+(S.channel===c[0]?'on':'')+'" data-ch="'+c[0]+'">'+c[1]+'</button>'; }).join('');
    var vat=[['incl','Incl. VAT'],['excl','Excl. VAT']];
    document.getElementById('vatSeg').innerHTML=vat.map(function(v){
      return '<button class="'+(S.vat===v[0]?'on':'')+'" data-vat="'+v[0]+'">'+v[1]+'</button>'; }).join('');
    document.querySelectorAll('#channelSeg button').forEach(function(b){ b.onclick=function(){ S.channel=b.dataset.ch; renderToggles(); render(); }; });
    document.querySelectorAll('#vatSeg button').forEach(function(b){ b.onclick=function(){ S.vat=b.dataset.vat; renderToggles(); render(); }; });
  }

  // ---------- main render ----------
  function render(){
    var list=inRange(), single=S.selStart===S.selEnd;
    var rangeText=single?fmtIS(S.selStart):fmtIS(S.selStart)+' – '+fmtIS(S.selEnd);
    var presets=[['latest','Latest day'],['7d','7D'],['30d','30D'],['90d','90D'],['all','All'],['custom','Custom…']];
    var pillsHtml=presets.map(function(p){ return '<button class="pill '+(S.preset===p[0]?'on':'')+'" data-p="'+p[0]+'">'+p[1]+'</button>'; }).join('');

    var html='<div class="dates" id="dates">'+pillsHtml+'<div class="rangetext">'+rangeText+'</div><div id="calMount"></div></div>';

    if(!list.length){
      html+='<div class="card"><div class="state">No data yet for this day — the report arrives with the next morning update.<br>Latest data available: '+fmtIS(maxDate())+'.</div></div>';
      body.innerHTML=html; wireDates(); return;
    }

    var total=0,orders=0,pizzas=0,catAgg={},best=null,ck=catKey();
    list.forEach(function(d){
      total+=totalOf(d); orders+=ordersOf(d);
      var v=totalOf(d); if(!best||v>best.v) best={v:v,date:d.date};
      var cats=chOf(d).categories||{};
      Object.keys(cats).forEach(function(n){
        if(!catAgg[n]) catAgg[n]={val:0,qty:0};
        catAgg[n].val+=cats[n][ck]||0; catAgg[n].qty+=cats[n].qty||0;
        if(n==='Pizzas') pizzas+=cats[n].qty||0;
      });
    });

    // previous period delta
    var len=Math.round((new Date(S.selEnd)-new Date(S.selStart))/864e5)+1;
    var pEnd=addDays(S.selStart,-1), pStart=addDays(S.selStart,-len);
    var prev=S.days.filter(function(d){ return d.date>=pStart && d.date<=pEnd; });
    var prevTotal=prev.reduce(function(a,d){ return a+totalOf(d); },0);
    var deltaHtml='<div class="delta" style="color:var(--faint)">—<div class="sub">no previous period</div></div>';
    if(prev.length && prevTotal>0){
      var pct=(total-prevTotal)/prevTotal*100, up=pct>=0;
      deltaHtml='<div class="delta" style="color:'+(up?'var(--up)':'var(--down)')+'">'+(up?'▲ ':'▼ ')+Math.abs(pct).toFixed(1)+'%<div class="sub">vs previous '+(len===1?'day':len+' days')+'</div></div>';
    }

    html+='<div class="tiles">'+
      '<div class="hero"><div><div class="label">'+(single?'Revenue · ':'Total revenue · ')+(S.vat==='incl'?'incl. VAT':'excl. VAT')+'</div><div class="big">'+fmtKr(total)+'</div></div>'+deltaHtml+'</div>'+
      tile('Orders',fmt0(orders))+
      tile('Pizzas sold',fmt0(pizzas),'cream')+
      tile('Avg / day',list.length?fmtCompact(total/list.length)+' kr':'—')+
      tile('Best day',best?fmtCompact(best.v)+' kr':'—','',best?fmtIS(best.date):'')+
    '</div>';

    html+='<div class="card"><div class="card-head"><div class="card-title">Daily revenue</div><div class="card-note">'+(single?'Selected day highlighted · 14 days context':list.length+' days · hover for details')+'</div></div><div style="position:relative" id="chartMount"></div></div>';

    var cats=Object.keys(catAgg).map(function(n){ return {name:n,val:catAgg[n].val,qty:catAgg[n].qty}; }).sort(function(a,b){ return b.val-a.val; }).slice(0,10);
    var palette=['#900000','#ad1f1f','#c43d3d','#e07a7a','#8e7777','#b8a09d','#6f5a58','#d9b4b4','#756c65','#a94444'];
    var maxCat=cats.length?cats[0].val:1;
    html+='<div class="card"><div class="card-title" style="margin-bottom:18px">Category breakdown · '+rangeText+'</div>'+
      cats.map(function(c,i){ var col=palette[i%palette.length];
        return '<div class="catrow"><div class="catname">'+c.name+'</div><div class="cattrack"><div class="catbar" style="width:'+Math.max(.5,c.val/maxCat*100).toFixed(1)+'%;background:'+col+';box-shadow:0 0 14px '+col+'55"></div></div><div class="catval"><b>'+fmtKr(c.val)+'</b><span>'+fmt0(c.qty)+' pcs</span></div></div>'; }).join('')+
      '</div>';

    var rev=list.slice().reverse(), limit=90;
    html+='<div class="card"><div class="card-head"><div class="card-title">Daily history</div><div class="card-note">'+(rev.length>limit?'Showing latest '+limit+' of '+rev.length+' days':rev.length+' days')+'</div></div><div class="table-scroll"><table><thead><tr><th>Date</th><th>Orders</th><th>Excl. VAT</th><th>VAT</th><th>Incl. VAT</th></tr></thead><tbody>'+
      rev.slice(0,limit).map(function(d){ var ch=chOf(d);
        return '<tr><td class="date">'+fmtIS(d.date)+'</td><td>'+fmt0(ordersOf(d))+'</td><td>'+fmtKr(ch.total_excl_vat||0)+'</td><td class="vat">'+fmtKr(ch.total_vat||0)+'</td><td class="incl">'+fmtKr(ch.total_incl_vat||0)+'</td></tr>'; }).join('')+
      '</tbody></table></div></div>';

    body.innerHTML=html;
    wireDates();
    drawChart(list);
  }

  function tile(label,value,cls,date){
    return '<div class="tile"><div class="label">'+label+'</div><div class="value '+(cls||'')+'">'+value+'</div>'+(date?'<div class="date">'+date+'</div>':'')+'</div>';
  }

  function wireDates(){
    document.querySelectorAll('#dates .pill').forEach(function(b){
      b.onclick=function(){
        if(b.dataset.p==='custom'){ S.calOpen=!S.calOpen; S.calMonth=null; drawCal(); }
        else { applyPreset(b.dataset.p); render(); }
      };
    });
    if(S.calOpen) drawCal();
  }

  // ---------- calendar ----------
  function drawCal(){
    var mount=document.getElementById('calMount'); if(!mount) return;
    if(!S.calOpen){ mount.innerHTML=''; return; }
    var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
    var cur=S.calMonth||new Date(maxDate()+'T00:00:00Z');
    var y=cur.getUTCFullYear(), m=cur.getUTCMonth();
    var startDow=(new Date(Date.UTC(y,m,1)).getUTCDay()+6)%7;
    var dim=new Date(Date.UTC(y,m+1,0)).getUTCDate();
    var minD=minDate(), maxD=maxDate();
    var cells='';
    ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(function(w){ cells+='<div class="cal-dow">'+w+'</div>'; });
    for(var i=0;i<startDow;i++) cells+='<div></div>';
    for(var day=1;day<=dim;day++){
      var iso=y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      var disabled=iso<minD||iso>maxD;
      var edge=iso===S.selStart||iso===S.selEnd;
      var between=S.selStart&&S.selEnd&&iso>S.selStart&&iso<S.selEnd;
      var c='cal-day'+(disabled?' disabled':'')+(edge?' edge':'')+(between?' between':'');
      cells+='<button class="'+c+'" '+(disabled?'disabled':'')+' data-iso="'+iso+'">'+day+'</button>';
    }
    mount.innerHTML='<div class="cal"><div class="cal-head"><button class="cal-nav" data-dir="-1">‹</button><b>'+months[m]+' '+y+'</b><button class="cal-nav" data-dir="1">›</button></div><div class="cal-grid">'+cells+'</div><div class="cal-hint">'+(S.picking?'Now click the end date — or the same day again for a single day':'Click a date to start · click again for a range')+'</div><div class="cal-done"><button data-done="1">Done</button></div></div>';
    mount.querySelectorAll('.cal-nav').forEach(function(b){ b.onclick=function(){ S.calMonth=new Date(Date.UTC(y,m+parseInt(b.dataset.dir,10),1)); drawCal(); }; });
    mount.querySelector('[data-done]').onclick=function(){ S.calOpen=false; S.picking=false; drawCal(); };
    mount.querySelectorAll('.cal-day:not(.disabled)').forEach(function(b){ b.onclick=function(){ pickDay(b.dataset.iso); }; });
  }
  function pickDay(iso){
    if(!S.picking){ S.selStart=iso; S.selEnd=iso; S.picking=true; S.preset='custom'; }
    else { var a=S.selStart,b=iso; if(b<a){ var t=a;a=b;b=t; } S.selStart=a; S.selEnd=b; S.picking=false; S.preset='custom'; }
    render();
  }

  // ---------- chart ----------
  function drawChart(rangeList){
    var mount=document.getElementById('chartMount'); if(!mount) return;
    var plot=rangeList, highlight=null;
    if(rangeList.length===1){ var idx=S.days.findIndex(function(d){ return d.date===rangeList[0].date; }); plot=S.days.slice(Math.max(0,idx-13),idx+1); highlight=plot.length-1; }
    var W=1000,H=300,padL=56,padR=16,padT=18,padB=30,pw=W-padL-padR,ph=H-padT-padB;
    var vals=plot.map(totalOf), rawMax=Math.max.apply(null,vals.concat([1]));
    var mag=Math.pow(10,Math.floor(Math.log10(rawMax))), norm=rawMax/mag;
    var niceMax=(norm<=1?1:norm<=2?2:norm<=5?5:10)*mag;
    var xF=function(i){ return padL+(plot.length>1?pw*i/(plot.length-1):pw/2); };
    var yF=function(v){ return padT+ph-ph*v/niceMax; };

    var svg=el('svg',{viewBox:'0 0 '+W+' '+H});
    var defs=el('defs',{}); var grad=el('linearGradient',{id:'gA',x1:0,y1:0,x2:0,y2:1});
    var s1=el('stop',{offset:'0%','stop-color':'#900000','stop-opacity':.34}); var s2=el('stop',{offset:'100%','stop-color':'#900000','stop-opacity':0});
    grad.appendChild(s1); grad.appendChild(s2); defs.appendChild(grad); svg.appendChild(defs);
    for(var i=0;i<=4;i++){ var yy=padT+ph-ph*i/4;
      svg.appendChild(el('line',{x1:padL,x2:W-padR,y1:yy,y2:yy,stroke:'rgba(255,255,255,0.06)'}));
      var lbl=el('text',{x:padL-8,y:yy+4,'text-anchor':'end',fill:'#aaa79e','font-size':11,'font-family':'inherit'}); lbl.textContent=fmtCompact(niceMax*i/4); svg.appendChild(lbl);
    }
    var pts=vals.map(function(v,i){ return [xF(i),yF(v)]; });
    var lineD='M'+pts.map(function(p){ return p[0].toFixed(1)+','+p[1].toFixed(1); }).join(' L');
    var areaD=lineD+' L'+(padL+pw).toFixed(1)+','+(padT+ph)+' L'+padL+','+(padT+ph)+' Z';
    svg.appendChild(el('path',{d:areaD,fill:'url(#gA)'}));
    var line=el('path',{d:lineD,fill:'none',stroke:'#e07a7a','stroke-width':2.5,'stroke-linejoin':'round','stroke-linecap':'round'}); line.style.filter='drop-shadow(0 0 6px rgba(144,0,0,0.55))'; svg.appendChild(line);
    var every=Math.max(1,Math.ceil(plot.length/8));
    plot.forEach(function(d,i){ if(i%every!==0 && i!==plot.length-1) return;
      var t=el('text',{x:xF(i),y:H-8,'text-anchor':'middle',fill:'#aaa79e','font-size':11,'font-family':'inherit'}); t.textContent=fmtShort(d.date); svg.appendChild(t); });
    if(highlight!=null){ var hl=el('circle',{cx:pts[highlight][0],cy:pts[highlight][1],r:7,fill:'#900000',stroke:'#11110f','stroke-width':3}); hl.style.filter='drop-shadow(0 0 10px rgba(144,0,0,0.8))'; svg.appendChild(hl); }

    mount.appendChild(svg);
    var tip=document.createElement('div'); tip.className='tooltip'; mount.appendChild(tip);
    var hover=el('line',{x1:0,x2:0,y1:padT,y2:padT+ph,stroke:'rgba(255,255,255,0.2)','stroke-dasharray':'3 3'}); hover.style.display='none';
    var hdot=el('circle',{r:5,fill:'#e07a7a',stroke:'#11110f','stroke-width':2}); hdot.style.display='none';
    svg.appendChild(hover); svg.appendChild(hdot);
    svg.addEventListener('mousemove',function(e){
      var rect=svg.getBoundingClientRect(); var x=(e.clientX-rect.left)/rect.width*W;
      var i=Math.round((x-padL)/(pw/Math.max(1,plot.length-1))); i=Math.max(0,Math.min(plot.length-1,i));
      var p=pts[i], d=plot[i];
      hover.setAttribute('x1',p[0]); hover.setAttribute('x2',p[0]); hover.style.display='block';
      hdot.setAttribute('cx',p[0]); hdot.setAttribute('cy',p[1]); hdot.style.display='block';
      tip.style.display='block';
      var leftPct=p[0]/W*100; tip.style.left=leftPct+'%'; tip.style.transform='translateX('+(leftPct>70?'-110%':'10px')+')';
      tip.innerHTML='<div class="t-date">'+fmtIS(d.date)+'</div><div class="t-row"><span style="color:var(--muted)">'+(S.vat==='incl'?'Incl. VAT':'Excl. VAT')+'</span><span style="color:var(--accent-strong);font-weight:600">'+fmtKr(totalOf(d))+'</span></div><div class="t-row"><span style="color:var(--muted)">Orders</span><span>'+fmt0(ordersOf(d))+'</span></div>';
    });
    svg.addEventListener('mouseleave',function(){ hover.style.display='none'; hdot.style.display='none'; tip.style.display='none'; });
  }
})();
</script>
</body>
</html>
