name: Historical backfill

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Start date (YYYY-MM-DD)"
        required: true
        default: "2025-01-01"
      end:
        description: "End date (YYYY-MM-DD). Leave blank for yesterday."
        required: false

permissions:
  contents: write

# Shares the daily workflow's group so a backfill never races the daily
# run when committing history.json.
concurrency:
  group: "daily-sales-report"
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      WOOCOMMERCE_URL: ${{ secrets.WOOCOMMERCE_URL }}
      WOOCOMMERCE_CONSUMER_KEY: ${{ secrets.WOOCOMMERCE_CONSUMER_KEY }}
      WOOCOMMERCE_CONSUMER_SECRET: ${{ secrets.WOOCOMMERCE_CONSUMER_SECRET }}
      DINEOUT_USERNAME: ${{ secrets.DINEOUT_USERNAME }}
      DINEOUT_PASSWORD: ${{ secrets.DINEOUT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run backfill
        working-directory: scripts
        run: |
          if [ -n "${{ github.event.inputs.end }}" ]; then
            python backfill.py "${{ github.event.inputs.start }}" "${{ github.event.inputs.end }}"
          else
            python backfill.py "${{ github.event.inputs.start }}"
          fi

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-debug
          path: dineout_debug/
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit updated history
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          git diff --cached --quiet || git commit -m "Backfill: ${{ github.event.inputs.start }}..${{ github.event.inputs.end || 'yesterday' }}"
          git pull --rebase origin main
          git push
