name: DineOut recon (one-off)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recon:
    runs-on: ubuntu-latest
    env:
      DINEOUT_USERNAME: ${{ secrets.DINEOUT_USERNAME }}
      DINEOUT_PASSWORD: ${{ secrets.DINEOUT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run recon
        working-directory: scripts
        run: python dineout_recon.py

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dineout-recon
          path: dineout_debug/
          retention-days: 7
